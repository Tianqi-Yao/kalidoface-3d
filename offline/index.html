    <!-- OAK-D 相机接入:在 app 主逻辑执行前拦截 getUserMedia,
         把视频输入替换成本地反代过来的 OAK MJPEG 画面。
         纯音频请求(通话功能用麦克风)原样透传给真实实现。
         详见 offline/QUICKSTART.md "使用 OAK-D 相机作为输入源"。 -->
    <script>
      (function () {
        var OAK_CONFIG = {
          enabled: true, // 总开关;false 时完全不 patch,行为等同普通摄像头
          proxyPath: "/oak/cam1", // 同源反代路径,换成 "/oak/cam2" 切另一台相机
          fps: 25, // 对齐 IMU_GPS/config.py 的 CAM_FPS
          firstFrameTimeoutMs: 4000, // 首帧超时(ms),超时后回退真实摄像头
          debug: true, // 是否在 console 打印 [OAK-bridge] 日志
        };

        if (!OAK_CONFIG.enabled) return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

        var realGetUserMedia = navigator.mediaDevices.getUserMedia.bind(
          navigator.mediaDevices
        );

        function log() {
          if (OAK_CONFIG.debug) {
            console.log.apply(
              console,
              ["[OAK-bridge]"].concat(Array.prototype.slice.call(arguments))
            );
          }
        }

        function wantsVideo(constraints) {
          return !!(constraints && constraints.video);
        }

        // app 自己会调用 enumerateDevices() 来填充摄像头下拉列表,并且在
        // videoinput 数组为空时直接读 videoinput[0].deviceId(没有做空数组
        // 判断),会抛 "Cannot read properties of undefined"。因为我们的
        // getUserMedia 补丁从没调用过真实的原生摄像头 API,浏览器永远不会
        // 真正对这个 origin 授予摄像头权限,enumerateDevices() 就会一直
        // 返回"未授权"状态下的空/无标签设备列表——这是我们这个补丁间接
        // 导致的,不是原本就有的问题。补一个假的 OAK 设备条目进去,
        // 避免应用这段没做防御判断的代码崩掉。
        if (navigator.mediaDevices.enumerateDevices) {
          var realEnumerateDevices = navigator.mediaDevices.enumerateDevices.bind(
            navigator.mediaDevices
          );
          navigator.mediaDevices.enumerateDevices = function () {
            return realEnumerateDevices().then(function (devices) {
              var hasRealVideoInput = devices.some(function (d) {
                return d.kind === "videoinput" && d.deviceId;
              });
              if (hasRealVideoInput) return devices;
              log("no real videoinput device found, injecting fake OAK device entry");
              return devices.concat([
                {
                  deviceId: "oak-camera",
                  groupId: "oak-camera-group",
                  kind: "videoinput",
                  label: "OAK-D Camera (via proxy)",
                  toJSON: function () {
                    return this;
                  },
                },
              ]);
            });
          };
        }

        // 缓存已建好的流,避免用户反复点 Start/Stop 时重复创建 img/canvas/rAF 循环
        var cachedStreamPromise = null;

        function buildOakStream() {
          return new Promise(function (resolve, reject) {
            var img = new Image();
            var canvas = document.createElement("canvas");
            var ctx = canvas.getContext("2d");
            var stopped = false;
            var gotFirstFrame = false;
            var rafId = null;
            var timeoutId = null;

            // 用 visibility:hidden 挪出视口,而不是 display:none——
            // 部分浏览器会暂停 display:none 元素的图像解码/刷新
            img.style.cssText =
              "position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;visibility:hidden;";
            document.body.appendChild(img);

            function cleanup() {
              if (stopped) return;
              stopped = true;
              if (rafId) cancelAnimationFrame(rafId);
              if (timeoutId) clearTimeout(timeoutId);
              img.onerror = null;
              img.src = "";
              if (img.parentNode) img.parentNode.removeChild(img);
            }

            timeoutId = setTimeout(function () {
              if (!gotFirstFrame) {
                cleanup();
                reject(
                  new Error(
                    "OAK first frame timeout after " +
                      OAK_CONFIG.firstFrameTimeoutMs +
                      "ms"
                  )
                );
              }
            }, OAK_CONFIG.firstFrameTimeoutMs);

            img.onerror = function () {
              if (!gotFirstFrame) {
                cleanup();
                reject(new Error("OAK MJPEG <img> failed to load (proxy/camera unreachable)"));
              }
            };

            function drawLoop() {
              if (stopped) return;
              if (img.naturalWidth && img.naturalHeight) {
                // canvas 尺寸跟随实际来源分辨率动态调整,避免写死导致变形
                if (
                  canvas.width !== img.naturalWidth ||
                  canvas.height !== img.naturalHeight
                ) {
                  canvas.width = img.naturalWidth;
                  canvas.height = img.naturalHeight;
                  log("canvas resized to", canvas.width, canvas.height);
                }
                try {
                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                } catch (e) {
                  if (!gotFirstFrame) {
                    cleanup();
                    reject(e);
                    return;
                  }
                }
                if (!gotFirstFrame) {
                  gotFirstFrame = true;
                  clearTimeout(timeoutId);
                  // captureStream() 本身也可能抛(比如浏览器不支持),
                  // 必须包 try/catch——否则抛出的异常会让这个 rAF 循环
                  // 直接中断,Promise 既不 resolve 也不 reject,永远挂起,
                  // "Start Face Tracking" 会卡住且没有任何报错。
                  try {
                    var stream = canvas.captureStream(OAK_CONFIG.fps);
                    // 注意:MediaStreamTrack 规范里,消费方主动调用 track.stop()
                    // 并不会触发 'ended' 事件(那个事件只在轨道因外部原因终止时才
                    // 触发,比如设备被拔出)。app 点击"Stop"时就是直接调用
                    // track.stop(),所以必须直接包一层 stop() 本身来做清理 +
                    // 让 cachedStreamPromise 失效——否则下次点 Start 会拿到这条
                    // 已经 stop() 过的死流,导致"再次开启没反应"。
                    var track = stream.getVideoTracks()[0];
                    if (track) {
                      var realStop = track.stop.bind(track);
                      track.stop = function () {
                        realStop();
                        cleanup();
                        cachedStreamPromise = null;
                        log("OAK track stopped, cache invalidated");
                      };
                    }
                    log(
                      "OAK stream ready:",
                      canvas.width + "x" + canvas.height
                    );
                    resolve(stream);
                  } catch (e) {
                    cleanup();
                    reject(e);
                    return;
                  }
                }
              }
              rafId = requestAnimationFrame(drawLoop);
            }

            rafId = requestAnimationFrame(drawLoop);
            img.src = OAK_CONFIG.proxyPath + "?t=" + Date.now();
          });
        }

        var patchedGetUserMedia = function (constraints) {
          if (!wantsVideo(constraints)) {
            log("audio-only request, passthrough to real getUserMedia");
            return realGetUserMedia(constraints);
          }
          log("video request intercepted");
          if (cachedStreamPromise) {
            log("reusing cached OAK stream");
            return cachedStreamPromise;
          }
          cachedStreamPromise = buildOakStream().catch(function (err) {
            log("OAK bridge failed, falling back to real camera:", err.message);
            cachedStreamPromise = null; // 失败不缓存,允许下次重试
            return realGetUserMedia(constraints);
          });
          return cachedStreamPromise;
        };
        patchedGetUserMedia.__oakPatched = true;
        navigator.mediaDevices.getUserMedia = patchedGetUserMedia;

        log("getUserMedia video patch installed, proxyPath =", OAK_CONFIG.proxyPath);
      })();
    </script>

    <!-- 让真实摄像头画面作为全屏背景显示在 3D 场景下面 -->
    <!-- 新建独立的 <video>,同步 #user-cam(真实摄像头)的画面流,避免直接改动
         应用自带的可拖拽小预览框(#drag-cam 由 interactjs 控制定位,直接改容易出问题) -->
    <style>
      #kf3d-camera-bg {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 0;
        transform: scaleX(-1);
        pointer-events: none;
        background: transparent;
      }
    </style>
    <script>
      (function () {
        function setup() {
          var src = document.getElementById("user-cam");
          if (!src) {
            setTimeout(setup, 200);
            return;
          }
          var bg = document.createElement("video");
          bg.id = "kf3d-camera-bg";
          bg.autoplay = true;
          bg.muted = true;
          bg.playsInline = true;
          document.body.insertBefore(bg, document.body.firstChild);
          setInterval(function () {
            if (src.srcObject && bg.srcObject !== src.srcObject) {
              bg.srcObject = src.srcObject;
              bg.play().catch(function () {});
            }
          }, 500);
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", setup);
        } else {
          setup();
        }
      })();
    </script>
